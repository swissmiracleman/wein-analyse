      n = applyAliases(n); n = removeFillerWords(n);
      n = n.replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue');
      n = n.replace(/\bhauswein\b/g,"").normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      n = n.replace(/\d+(?:[.,]\d+)?\s*(cl|dl|l|ml)\b/g,"").replace(/\b(flasche|magnum|fl|cüpli|cupli)\b/g,"").replace(/[^a-z0-9\s]/g,"");
      return n.trim();
    };
    /** @param {string} name - Wine name @returns {number} Volume factor relative to 75cl bottle */
    const extractVolumeFactor = (name) => {
      const l = name.toLowerCase();
      if (l.includes('magnum')||l.includes('1.5l')||l.includes('150cl')) return 2.0;
      if (l.includes('37.5cl')||l.includes('3.75dl')) return 0.5;
      if (l.includes('cüpli')||l.includes('cupli')) return 0.1333;
      const dl = l.match(/(\d+(?:[.,]\d+)?)\s*dl/); if (dl) return parseFloat(dl[1].replace(',','.'))/7.5;
      const cl = l.match(/(\d+(?:[.,]\d+)?)\s*cl/); if (cl) return parseFloat(cl[1].replace(',','.'))/75;
      return 1.0;
    };
    /** @param {string} name @returns {boolean} true if item is not wine */
    const isNonWine = (name) => { const l = name.toLowerCase(); if (/\b(2cl|4cl)\b/.test(l)) return true; return EXCLUSION_WORDS.some(w => l.includes(w)); };

    const validateColumns = (data, type) => {
      if (!data.length) return { valid: false, message: STRINGS.errors.fileEmpty };
      const cols = Object.keys(data[0]);
      if (type === 'master') { const m = REQUIRED_MASTER_COLS.filter(c => !cols.includes(c)); if (m.length) return { valid: false, message: `${STRINGS.errors.colsMissing}: ${m.join(', ')}` }; }
      else { if (!REQUIRED_POS_COLS_OPTIONS.some(o => o.every(c => cols.includes(c)))) return { valid: false, message: `Spalte 'Bezeichnung' oder 'Artikelname' fehlt.` }; }

    /** @description Filtert POS-Daten via LLM — unterstützt Gemini, OpenAI, Claude, Mistral */
    const filterWithLLM = async (posData, key, provider) => {
      if (!key || !provider || !LLM_PROVIDERS[provider]) return posData;
      const cfg = LLM_PROVIDERS[provider];
      const names = [...new Set(posData.map(r => r.Bezeichnung||r.Artikelname||"").filter(Boolean))];
      const prompt = `Analysiere diese Gastronomie-Artikel. Gib ein JSON Array zurück mit NUR Wein/Schaumwein/Offenwein. Keine Biere, Soft, Spirituosen, Speisen. Nur das Array, keine Erklärung.\n\n${JSON.stringify(names)}`;
      try {
        const res = await fetch(cfg.url(key), {
          method: 'POST',
          headers: cfg.headers(key),
          body: JSON.stringify(cfg.buildBody(prompt))
        });
        if (!res.ok) { console.error(`LLM ${provider} error:`, res.status); return posData; }
        const r = await res.json();
        const t = cfg.extractText(r);
        if (t) {
          try {
            let parsed = JSON.parse(t);
            // Manche LLMs wrappen in ein Objekt statt Array
            if (!Array.isArray(parsed) && typeof parsed === 'object') {
              const vals = Object.values(parsed);
              parsed = vals.find(v => Array.isArray(v)) || [];
            }
            if (Array.isArray(parsed)) {
              const s = new Set(parsed);
              return posData.filter(r => { const n=r.Bezeichnung||r.Artikelname||""; return s.has(n)||OPEN_POS_KEYWORDS.some(k=>n.toLowerCase().includes(k)); });
            }
          } catch(e) { console.error("LLM JSON parse failed:", e); }
        }
      } catch(e) { console.error("LLM failed:", e); }
      return posData;
    };

    const useAnimatedCounter = (end, duration = 1500, isCurrency = true) => {
      const [value, setValue] = useState(0);
      const prevEnd = useRef(0);
      useEffect(() => {
        if (end === 0) { setValue(0); return; }
        const startVal = prevEnd.current;
        prevEnd.current = end;
        const startTime = performance.now();
        const tick = (now) => {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const current = startVal + (end - startVal) * eased;
          setValue(current);
          if (progress < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }, [end, duration]);
      if (isCurrency) return new Intl.NumberFormat('de-CH', { style: 'currency', currency: 'CHF' }).format(value);
      return new Intl.NumberFormat('de-CH', { maximumFractionDigits: 1 }).format(value);
    };

    const useLocalStorage = (key, defaultValue) => {
      const [value, setValue] = useState(() => {
        try { const stored = localStorage.getItem(key); return stored !== null ? JSON.parse(stored) : defaultValue; } catch (e) { return defaultValue; }
      });
      const setStoredValue = useCallback((newValue) => {
        setValue(prev => {
          const resolved = typeof newValue === 'function' ? newValue(prev) : newValue;
          try { localStorage.setItem(key, JSON.stringify(resolved)); } catch (e) {}
          return resolved;
        });
      }, [key]);
      return [value, setStoredValue];
    };

    const useDebounce = (value, delay) => {
      const [debouncedValue, setDebouncedValue] = useState(value);
      useEffect(() => {
        const handler = setTimeout(() => setDebouncedValue(value), delay);
        return () => clearTimeout(handler);
      }, [value, delay]);
      return debouncedValue;
    };

    const useKeyboardShortcut = (key, callback, options = {}) => {
      useEffect(() => {
        const handler = (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
          if (options.ctrlKey && !e.ctrlKey && !e.metaKey) return;
          if (options.shiftKey && !e.shiftKey) return;
          if (options.altKey && !e.altKey) return;
          if (e.key === key || e.key.toLowerCase() === key.toLowerCase()) { e.preventDefault(); callback(e); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [key, callback, options.ctrlKey, options.shiftKey, options.altKey]);
    };

    const MatrixCard = React.memo(({ cat, items, matrixSearch }) => {

    // ============================================================
    // SECTION: Analysis Engine
    // ============================================================
    // (Analysis logic is inside App component using useMemo for masterNorm/masterIndex)

    // ============================================================
    // SECTION: Main Application
    // ============================================================
    function App() {
      // --- Core State ---
      const [masterData, setMasterData] = useState([]);
      const [posData, setPosData] = useState([]);
      const [posDataVorjahr, setPosDataVorjahr] = useState([]);
      const [isCalculating, setIsCalculating] = useState(false);
      const [calcStatus, setCalcStatus] = useState("");
      const [analysisResult, setAnalysisResult] = useState(null);
      const [useLLM, setUseLLM] = useState(true);
      const [toast, setToast] = useState(null);
      const [showKeyInput, setShowKeyInput] = useState(false);
      const [unmatchedItems, setUnmatchedItems] = useState([]);
      const [uiState, setUiState] = useState({ showUnmatched: false, confirmIgnore: null });
      const [activeTab, setActiveTab] = useState('overview');
      const analysisRef = useRef(0);

      // Architect: useLocalStorage for persistent state
      const [llmProvider, setLlmProvider] = useLocalStorage('weinAnalyseLLMProvider', 'gemini');
      const [llmKey, setLlmKey] = useLocalStorage('weinAnalyseLLMKey', "");
      const [learnedRules, setLearnedRules] = useLocalStorage('weinAnalyseRules', {});
      const [darkMode, setDarkMode] = useLocalStorage('weinAnalyseDarkMode', false);
      const [wineNotes, setWineNotes] = useLocalStorage('weinAnalyseNotes', {});

      // Premium-UX State
      const [showOnboarding, setShowOnboarding] = useState(() => { try { return !localStorage.getItem('weinAnalyseOnboarded'); } catch(e) { return true; } });
      const [showCommandPalette, setShowCommandPalette] = useState(false);
      const [showShortcutsHelp, setShowShortcutsHelp] = useState(false);
      const [isFullscreen, setIsFullscreen] = useState(false);
      const [dropTarget, setDropTarget] = useState(null);
      const [tabKey, setTabKey] = useState(0);
      const [sortConfig, setSortConfig] = useState({ key: null, dir: 'desc' });

      // Features: Matrix Search with debounce
      const [matrixSearch, setMatrixSearch] = useState('');
      const debouncedMatrixSearch = useDebounce(matrixSearch, 200);

      // Business State
      const [calcMode, setCalcMode] = useState('markup'); // 'markup' | 'fixedDB' | 'fixedVP' | 'targetDBpct'
      const [calcMargin, setCalcMargin] = useState(300);
      const [calcFixedDB, setCalcFixedDB] = useState(40);
      const [calcFixedVP, setCalcFixedVP] = useState(55);
      const [calcTargetDBpct, setCalcTargetDBpct] = useState(60);
      const [openWineGlassSize, setOpenWineGlassSize] = useState(1.5);
      const [openWineSchwund, setOpenWineSchwund] = useState(10);
      const [cardPlanMaxWines, setCardPlanMaxWines] = useState(20);
      const [seasonFilter, setSeasonFilter] = useState('all');

      // Management State
      const [currentBetrieb, setCurrentBetrieb] = useLocalStorage('weinAnalyseBetrieb', 'default');
      const [betriebe, setBetriebe] = useLocalStorage('weinAnalyseBetriebe', [{ id: 'default', name: 'Mein Betrieb', logo: null }]);
      const [showBetriebModal, setShowBetriebModal] = useState(false);
      const [newBetriebName, setNewBetriebName] = useState('');
      const [newBetriebLogo, setNewBetriebLogo] = useState(null);
      const [showBetriebVergleich, setShowBetriebVergleich] = useState(false);
      const [betriebVergleichData, setBetriebVergleichData] = useState([]);
      const [zeitraumFilter, setZeitraumFilter] = useState('all');
      const [customDateFrom, setCustomDateFrom] = useState('');
      const [customDateTo, setCustomDateTo] = useState('');
      const [zielUmsatz, setZielUmsatz] = useLocalStorage('weinAnalyseZiel', 0);
      const [showZielModal, setShowZielModal] = useState(false);
      const [tempZiel, setTempZiel] = useState(0);

      // --- Premium-UX: Tab Switch Helper ---
      const switchTab = useCallback((id) => {
        setActiveTab(id);
        setTabKey(k => k + 1);
      }, []);

      // --- Helpers ---
      const showToast = (msg, type="error") => { setToast({msg,type}); setTimeout(()=>setToast(null), 4000); };
      const saveRule = (name, obj) => { setLearnedRules(prev => ({...prev, [name]: obj})); };
      const saveLlmKey = (k) => { setLlmKey(k); setShowKeyInput(false); };

      // --- Premium-UX: Command handler ---
      const handleCommand = useCallback((cmdId) => {
        const tabIds = ['overview','insights','pricecalc','cardplan','abc','matrix','comparison','details'];
        if (tabIds.includes(cmdId)) { switchTab(cmdId); return; }
        if (cmdId === 'toggle-dark') { setDarkMode(d => !d); return; }
        if (cmdId === 'export-xlsx') { exportResults(); return; }
        if (cmdId === 'print') { window.print(); return; }
        if (cmdId === 'fullscreen') { setIsFullscreen(f => !f); return; }
        if (cmdId === 'shortcuts') { setShowShortcutsHelp(true); return; }
      }, [switchTab]);

      // --- Premium-UX: Keyboard Shortcuts ---
      useKeyboardShortcut('k', () => setShowCommandPalette(true), { ctrlKey: true });
      useKeyboardShortcut('d', () => setDarkMode(d => !d));
      useKeyboardShortcut('e', () => { if (analysisResult) exportResults(); });
      useKeyboardShortcut('p', () => window.print());
      useKeyboardShortcut('f', () => setIsFullscreen(f => !f));
      useKeyboardShortcut('?', () => setShowShortcutsHelp(s => !s));
      useKeyboardShortcut('Escape', () => { setShowCommandPalette(false); setShowShortcutsHelp(false); setIsFullscreen(false); });
      const tabShortcuts = ['overview','insights','pricecalc','cardplan','abc','matrix','comparison','details'];
      tabShortcuts.forEach((tab, i) => {
        useKeyboardShortcut(String(i + 1), () => switchTab(tab));
      });

      // --- Premium-UX: Drag & Drop ---
      const handleDragOver = (e, type) => { e.preventDefault(); e.stopPropagation(); setDropTarget(type); };
      const handleDragLeave = (e) => { e.preventDefault(); setDropTarget(null); };
      const handleDrop = (e, type) => {
        e.preventDefault(); e.stopPropagation(); setDropTarget(null);
        const file = e.dataTransfer?.files?.[0];
        if (file) handleFileUpload({ target: { files: [file] } }, type);
      };

      // --- Management: Zeitraum Filter ---
      const getFilteredPosData = useCallback((data) => {
        if (zeitraumFilter === 'all' || !data.length) return data;
        const now = new Date();
        let startDate;
        if (zeitraumFilter === 'month') { startDate = new Date(now.getFullYear(), now.getMonth() - 1, now.getDate()); }
        else if (zeitraumFilter === 'quarter') { startDate = new Date(now.getFullYear(), now.getMonth() - 3, now.getDate()); }
        else if (zeitraumFilter === 'halfyear') { startDate = new Date(now.getFullYear(), now.getMonth() - 6, now.getDate()); }
        else if (zeitraumFilter === 'year') { startDate = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate()); }
        else if (zeitraumFilter === 'custom' && customDateFrom && customDateTo) { startDate = new Date(customDateFrom); const endDate = new Date(customDateTo); return data.filter(r => { const d = new Date(r.Datum || r.Date || r.datum || ''); return d >= startDate && d <= endDate; }); }
        else return data;
        return data.filter(r => { const d = new Date(r.Datum || r.Date || r.datum || ''); return d >= startDate; });
      }, [zeitraumFilter, customDateFrom, customDateTo]);

      // --- Management: Sort helper ---
      const handleSort = (key) => {
        setSortConfig(prev => ({ key, dir: prev.key === key && prev.dir === 'desc' ? 'asc' : 'desc' }));
      };
      const sortData = (data, config) => {
        if (!config.key) return data;
        return [...data].sort((a, b) => {
          const av = a[config.key] ?? 0, bv = b[config.key] ?? 0;
          if (typeof av === 'string') return config.dir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
          return config.dir === 'asc' ? av - bv : bv - av;
        });
      };

      const handleFileUpload = async (e, type) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const wb = XLSX.read(evt.target.result, {type:'array'}); const ws = wb.Sheets[wb.SheetNames[0]];
            const data = XLSX.utils.sheet_to_json(ws,{defval:""}).map(row => { const c={}; Object.keys(row).forEach(k => { let v=row[k]; if(typeof v==='string') v=fixEncoding(v); c[k.trim()]=v; }); return c; });
            const val = validateColumns(data, type); if (!val.valid) { showToast(val.message); return; }
            if (type==='master') setMasterData(data.sort((a,b)=>(b.Name?.length||0)-(a.Name?.length||0)));
            if (type==='pos') setPosData(data);
            if (type==='posVorjahr') setPosDataVorjahr(data);
          } catch(err) { showToast(STRINGS.errors.readFail); }
        };
        reader.readAsArrayBuffer(file);
      };

      // Analysis Engine: Memoized normalization
      const masterNorm = useMemo(() => masterData.map(m => ({
        ...m,
        normName: normalizeString(`${m.Name||""} ${m.Weintyp||""}`),
        normTokens: normalizeString(`${m.Name||""} ${m.Weintyp||""}`).split(' ').filter(t => t.length > 2)
      })), [masterData]);

      const masterIndex = useMemo(() => {
        const idx = new Map();
        masterNorm.forEach(m => { m.normTokens.forEach(t => { if (!idx.has(t)) idx.set(t, []); idx.get(t).push(m); }); });
        return idx;
      }, [masterNorm]);

      const runAnalysis = async () => {
        if (!masterData.length||!posData.length) return;
        const thisRun = ++analysisRef.current;
        setIsCalculating(true);
        let curPos=posData, curVJ=posDataVorjahr;

        // Management: Apply zeitraum filter
        curPos = getFilteredPosData(curPos);
        if (curVJ.length) curVJ = getFilteredPosData(curVJ);

        if (useLLM&&llmKey) {
          setCalcStatus(STRINGS.analysis.kiFilter);
          curPos = await filterWithLLM(curPos,llmKey,llmProvider); if(thisRun!==analysisRef.current) return;
          if(posDataVorjahr.length){ curVJ = await filterWithLLM(curVJ,llmKey,llmProvider); if(thisRun!==analysisRef.current) return; }
        }
        setCalcStatus(STRINGS.analysis.matching);
        setTimeout(() => {
          if(thisRun!==analysisRef.current) return;
          let tS=0,tDB=0,tV=0,vS=0; const iS={},unk=[],cS={},tyS={};
          const vjItems={};
          const mN = masterNorm;
          const mIdx = masterIndex;
          const colorConflict=(a,b)=>{const c={red:['rouge','rot','rosso','tinto'],white:['blanc','weiss','bianco','blanco'],rose:['rose','rosato']};const g=s=>Object.keys(c).find(k=>c[k].some(w=>s.includes(w)));const x=g(a),y=g(b);return x&&y&&x!==y;};
          const findMatch=(pN)=>{for(const m of mN){if(m.normName.includes(pN)||pN.includes(m.normName))return m;}const pT=pN.split(' ').filter(t=>t.length>2);if(pT.length<=1)return null;const cands=new Set();pT.forEach(t=>{const ms=mIdx.get(t);if(ms)ms.forEach(m=>cands.add(m));});for(const m of cands){if(colorConflict(pN,m.normName))continue;const o=pT.filter(t=>m.normTokens.includes(t)).length;const s=Math.min(pT.length,m.normTokens.length);if(o>=2&&(o/s)>=0.66)return m;}return null;};
          const proc=(ds,isVJ=false)=>{ds.forEach(r=>{const rN=r.Bezeichnung||r.Artikelname||"";const q=parseFloat(r.Zeitraum||r.Menge||r['Verkaufte Menge'])||0;if(!rN||q<=0)return;if(rN.toLowerCase().startsWith("gesamt"))return;if(!useLLM&&isNonWine(rN))return;const rule=learnedRules[rN];if(rule&&rule.type==='ignore')return;const vF=extractVolumeFactor(rN);const pN=normalizeString(rN);let mm=findMatch(pN);if(rule&&rule.type==='custom')mm={Name:rN,VP:rule.vp,EP:rule.ep,DB:rule.vp-rule.ep,Land:'Manuell',Weintyp:'Manuell'};if(mm){const cVP=(parseFloat(mm.VP)||0)*vF;const cDB=(parseFloat(mm.DB)||0)*vF;const lS=cVP*q,lDB=cDB*q,lV=vF*q;if(isVJ){vS+=lS;if(!vjItems[mm.Name])vjItems[mm.Name]={name:mm.Name,sales:0,vol:0};vjItems[mm.Name].sales+=lS;vjItems[mm.Name].vol+=lV;}else{tS+=lS;tDB+=lDB;tV+=lV;if(!iS[mm.Name])iS[mm.Name]={name:mm.Name,sales:0,db:0,vol:0,avgDbPerUnit:0,vp:parseFloat(mm.VP)||0,ep:parseFloat(mm.EP)||0,land:mm.Land||'Unbekannt',typ:mm.Weintyp||'Unbekannt',lieferant:mm.Lieferant||'',bestand:parseFloat(mm.Bestand)||0};iS[mm.Name].sales+=lS;iS[mm.Name].db+=lDB;iS[mm.Name].vol+=lV;const la=mm.Land?.trim()||'Unbekannt';cS[la]=(cS[la]||0)+lS;const ty=mm.Weintyp?.trim()||'Unbekannt';tyS[ty]=(tyS[ty]||0)+lS;}}else if(!isVJ){const isO=OPEN_POS_KEYWORDS.some(k=>rN.toLowerCase().includes(k));if(useLLM||looksLikeWine(rN)||isO){if(!unk.some(u=>u.name===rN))unk.push({name:rN,qty:q,volFactor:vF});}}});};
          proc(curPos,false); if(curVJ.length) proc(curVJ,true);
          const iA=Object.values(iS); iA.forEach(i=>i.avgDbPerUnit=i.vol>0?i.db/i.vol:0);
          const aV=iA.length>0?iA.reduce((a,c)=>a+c.vol,0)/iA.length:0;
          const aDB=iA.length>0?iA.reduce((a,c)=>a+c.avgDbPerUnit,0)/iA.length:0;
          const mx={stars:[],cows:[],questions:[],dogs:[]};
          iA.forEach(i=>{const hV=i.vol>=aV,hDB=i.avgDbPerUnit>=aDB;if(hV&&hDB)mx.stars.push(i);else if(hV&&!hDB)mx.cows.push(i);else if(!hV&&hDB)mx.questions.push(i);else mx.dogs.push(i);});
          Object.keys(mx).forEach(k=>mx[k].sort((a,b)=>b.sales-a.sales));
          const cArr=Object.entries(cS).map(([n,s])=>({name:n,sales:s,pct:tS>0?(s/tS)*100:0})).sort((a,b)=>b.sales-a.sales);
          const tArr=Object.entries(tyS).map(([n,s])=>({name:n,sales:s,pct:tS>0?(s/tS)*100:0})).sort((a,b)=>b.sales-a.sales);

          // ABC-Analyse
          const sortedBySales = [...iA].sort((a,b)=>b.sales-a.sales);
          let cumSales = 0;
          const abcItems = sortedBySales.map(item => {
            cumSales += item.sales;
            const cumPct = tS > 0 ? (cumSales / tS * 100) : 0;
            const abc = cumPct <= 80 ? 'A' : cumPct <= 95 ? 'B' : 'C';
            return { ...item, abc, cumPct };
          });
          const abcSummary = { A: abcItems.filter(i=>i.abc==='A'), B: abcItems.filter(i=>i.abc==='B'), C: abcItems.filter(i=>i.abc==='C') };
          const avgBottlePrice = tV > 0 ? tS / tV : 0;
          const dbRankingTop10 = [...iA].sort((a,b)=>b.avgDbPerUnit-a.avgDbPerUnit).slice(0,10);

          // Empfehlungen
          const recommendations = [];
          mx.questions.sort((a,b)=>b.avgDbPerUnit-a.avgDbPerUnit).slice(0,3).forEach(item => {
            recommendations.push({ type:'promotion', icon:'rocket', color:'amber', text: `"${item.name}" hat ${formatCHF(item.avgDbPerUnit)} DB/Fl. aber nur ${formatNum(item.vol)} Fl. verkauft — Verkaufsförderung empfohlen.` });
          });
          mx.dogs.sort((a,b)=>a.avgDbPerUnit-b.avgDbPerUnit).slice(0,2).forEach(item => {
            recommendations.push({ type:'review', icon:'alert-triangle', color:'red', text: `"${item.name}" hat nur ${formatCHF(item.avgDbPerUnit)} DB/Fl. und ${formatNum(item.vol)} Fl. — Sortiment überprüfen.` });
          });
          if (mx.stars.length > 0) {
            const topStar = mx.stars[0];
            recommendations.push({ type:'highlight', icon:'star', color:'emerald', text: `"${topStar.name}" ist Ihr Top-Performer: ${formatCHF(topStar.sales)} Umsatz mit ${formatCHF(topStar.avgDbPerUnit)} DB/Fl.` });
          }
          if (abcSummary.A.length > 0 && abcSummary.C.length > 0) {
            recommendations.push({ type:'insight', icon:'lightbulb', color:'blue', text: `${abcSummary.A.length} A-Weine generieren 80% des Umsatzes. ${abcSummary.C.length} C-Weine tragen nur 5% bei — Straffung möglich.` });
          }

          // Vorjahr Vergleich
          let winners = [], losers = [];
          if (Object.keys(vjItems).length > 0) {
            const comparisons = iA.filter(item => vjItems[item.name]).map(item => {
              const vj = vjItems[item.name]; const diff = item.sales - vj.sales;
              const pctChange = vj.sales > 0 ? (diff / vj.sales * 100) : 0;
              return { name: item.name, salesNow: item.sales, salesVJ: vj.sales, diff, pctChange };
            });
            winners = [...comparisons].sort((a,b)=>b.diff-a.diff).slice(0,5).filter(c=>c.diff>0);
            losers = [...comparisons].sort((a,b)=>a.diff-b.diff).slice(0,5).filter(c=>c.diff<0);
            if (winners.length > 0) recommendations.push({ type:'trend', icon:'trending-up', color:'emerald', text: `Grösster Gewinner: "${winners[0].name}" mit +${formatCHF(winners[0].diff)} (${winners[0].pctChange>=0?'+':''}${winners[0].pctChange.toFixed(1)}%).` });
            if (losers.length > 0) recommendations.push({ type:'trend', icon:'trending-down', color:'red', text: `Grösster Verlierer: "${losers[0].name}" mit ${formatCHF(losers[0].diff)} (${losers[0].pctChange.toFixed(1)}%).` });
          }

          setAnalysisResult({totalSales:tS,totalDB:tDB,totalVolume:tV,vorjahrSales:vS,matrix:mx,countries:cArr,types:tArr,dbMargin:tS>0?(tDB/tS*100):0,
            vjItemSales:vjItems, abcItems, abcSummary, avgBottlePrice, dbRankingTop10, recommendations, winners, losers, allItems:iA});
          setUnmatchedItems(unk);
          launchConfetti();
          setIsCalculating(false);
        }, 100);
      };

      useEffect(()=>{ if(masterData.length>0&&posData.length>0) runAnalysis(); }, [masterData,posData,posDataVorjahr,learnedRules,useLLM,llmKey,llmProvider,zeitraumFilter,customDateFrom,customDateTo]);

      // Dark Mode effect
      useEffect(() => {
        document.body.classList.toggle('dark', darkMode);
        document.body.classList.add('dark-transition');

      // Fullscreen effect
      useEffect(() => {
        document.body.classList.toggle('fullscreen-mode', isFullscreen);
      }, [isFullscreen]);

      const exportResults = () => {
        if(!analysisResult) return;
        const rows=[["Kategorie","Name","Umsatz CHF","DB CHF","Menge Fl.","DB/Fl. CHF"]];
        ["stars","cows","questions","dogs"].forEach(cat=>{const lb={stars:"Star",cows:"Volumenträger",questions:"Schläfer",dogs:"Penner"}[cat];analysisResult.matrix[cat].forEach(i=>rows.push([lb,i.name,i.sales.toFixed(2),i.db.toFixed(2),i.vol.toFixed(1),i.avgDbPerUnit.toFixed(2)]));});
        rows.push([],["Land","Umsatz CHF","Anteil %"]); analysisResult.countries.forEach(c=>rows.push([c.name,c.sales.toFixed(2),c.pct.toFixed(1)]));
        rows.push([],["Weintyp","Umsatz CHF","Anteil %"]); analysisResult.types.forEach(t=>rows.push([t.name,t.sales.toFixed(2),t.pct.toFixed(1)]));
        const ws=XLSX.utils.aoa_to_sheet(rows); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Analyse");
        XLSX.writeFile(wb,`Wein-Analyse-${new Date().toISOString().slice(0,10)}.xlsx`);
      };

      const exportPDF = async () => {
        if (!analysisResult) return;
        showToast(STRINGS.export.pdfCreating, "success");
        try {
          const el = document.getElementById('analysis-content');
          if (!el) return;
          const canvas = await html2canvas(el, { scale: 2, backgroundColor: darkMode ? '#1a1720' : '#ffffff', useCORS: true, logging: false });
          const imgData = canvas.toDataURL('image/png');
          const pdf = new jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
          const pdfW = pdf.internal.pageSize.getWidth();
          const pdfH = pdf.internal.pageSize.getHeight();
          const margin = 10;
          const usableW = pdfW - 2 * margin;
          const imgW = canvas.width;
          const imgH = canvas.height;
          const ratio = usableW / imgW;
          const betriebName = betriebe.find(b => b.id === currentBetrieb)?.name || STRINGS.app.title;
          pdf.setFillColor(122, 28, 62);
          pdf.rect(0, 0, pdfW, 20, 'F');
          pdf.setTextColor(255, 255, 255);
          pdf.setFontSize(14);
          pdf.setFont(undefined, 'bold');
          pdf.text(`${betriebName} - ${STRINGS.app.title}`, margin, 13);
          pdf.setFontSize(8);
          pdf.setFont(undefined, 'normal');
          pdf.text(new Date().toLocaleDateString('de-CH'), pdfW - margin, 13, { align: 'right' });
          let yPos = 25;
          const pageContentH = pdfH - 30;
          let srcY = 0;
          while (srcY < imgH) {
            if (srcY > 0) { pdf.addPage(); yPos = 10; }
            const sliceH = Math.min((pageContentH - yPos) / ratio, imgH - srcY);
            const sliceCanvas = document.createElement('canvas');
            sliceCanvas.width = imgW; sliceCanvas.height = sliceH;
            const ctx = sliceCanvas.getContext('2d');
            ctx.drawImage(canvas, 0, srcY, imgW, sliceH, 0, 0, imgW, sliceH);
            const sliceData = sliceCanvas.toDataURL('image/png');
            pdf.addImage(sliceData, 'PNG', margin, yPos, usableW, sliceH * ratio);
            srcY += sliceH;
          }
          pdf.save(`Wein-Analyse-${new Date().toISOString().slice(0, 10)}.pdf`);
          showToast(STRINGS.export.pdfDone, "success");
        } catch (err) {
          console.error("PDF export error:", err);
          showToast(`${STRINGS.export.pdfFail}: ${err.message}`);

      const allTabs = useMemo(() => {

          {id:'overview',label:STRINGS.tabs.overview,icon:'layout-grid'},

          if (analysisResult.winners?.length > 0 || analysisResult.losers?.length > 0) tabs.push({id:'trends',label:STRINGS.tabs.trends,icon:'activity'});

                    <Icon name="printer" size={15} />Drucken<span className="kbd-badge">P</span>

                  <button onClick={()=>setDarkMode(!darkMode)}

                {llmKey && <p className="mt-3 text-xs text-emerald-600 flex items-center gap-1"><Icon name="circle-check" size={12} /> {LLM_PROVIDERS[llmProvider]?.name} Key aktiv</p>}

            {/* Upload Cards with Drag & Drop */}
            <div className="upload-section grid grid-cols-1 md:grid-cols-3 gap-5 no-print">

                { title:STRINGS.upload.master, type:"master", data:masterData, icon:"file-spreadsheet", gradient:"from-blue-500 to-blue-600" },
                { title:STRINGS.upload.pos, type:"pos", data:posData, icon:"bar-chart-3", gradient:"from-wine-500 to-wine-600" },

              ].map((c) => {

                    className={`group relative rounded-2xl border-2 transition-all duration-300 stagger-item ${dropTarget === c.type ? 'drop-active' : ''} ${loaded ? 'border-emerald-200 bg-gradient-to-br from-emerald-50 to-white shadow-sm' : 'border-gray-200 bg-white hover:border-gray-300 hover:shadow-md'} p-6`}>
                    <div className="flex items-center gap-3 mb-5">
                      <div className={`w-12 h-12 rounded-xl flex items-center justify-center ${loaded ? 'bg-emerald-100' : `bg-gradient-to-br ${c.gradient}`} transition-all`}>
                        <Icon name={loaded ? "circle-check" : c.icon} size={22} className={loaded ? "text-emerald-600" : "text-white"} />

                      <div>
                        <h3 className="font-semibold text-gray-800">{c.title}</h3>

                        const allItems = analysisResult.allItems || [];

                        const lands = [...new Set(allItems.map(i => i.land))];
                        lands.forEach(land => {
                          const landStars = analysisResult.matrix.stars.filter(i => i.land === land);
                          const landCows = analysisResult.matrix.cows.filter(i => i.land === land);
                          if (landStars[0]) selected.add(landStars[0].name);
                          if (landCows[0]) selected.add(landCows[0].name);
                        });
                        // Fill remaining with top performers
                        const sorted = [...allItems].sort((a, b) => b.sales - a.sales);
                        for (const item of sorted) {
                          if (selected.size >= cardPlanMaxWines) break;
                          selected.add(item.name);
                        }

                          return { ...item, daysLeft, status };
                        }).sort((a, b) => a.daysLeft - b.daysLeft);
                        const statusColors = { green: 'bg-emerald-100 text-emerald-700', yellow: 'bg-amber-100 text-amber-700', red: 'bg-red-100 text-red-700' };
                        return (
                          <div className="space-y-3">
                            {withStock.map(item => (
                              <div key={item.name} className="flex items-center gap-4 py-3 px-4 rounded-xl bg-gray-50 hover:bg-gray-100 transition stagger-item">
                                <div className={`w-10 h-10 rounded-lg flex items-center justify-center text-xs font-bold ${statusColors[item.status]}`}>{item.daysLeft}d</div>
                                <div className="flex-1 min-w-0">
                                  <div className="font-medium text-gray-800 truncate">{item.name}</div>
                                  <div className="text-xs text-gray-500">Bestand: {formatNum(item.bestand)} Fl.</div>
                                </div>
                                <div className="text-right">
                                  <div className="text-sm font-semibold text-gray-700">{formatNum(item.vol)} Fl./Jahr</div>
                                </div>
                              </div>
                            ))}
                            {withStock.length === 0 && <p className="text-gray-400 text-sm text-center py-8">Keine Bestandsdaten verfügbar.</p>}
                          </div>
                        );
                      })()}
                    </div>
                  </div>
                )}

                {/* ========== Saisonplaner Tab (Business) ========== */}
                {activeTab === 'season' && (
                  <div className="tab-transition space-y-5" key={`tab-season-${tabKey}`}>
                    <div className="bg-white rounded-2xl border border-gray-100 p-6 shadow-sm">
                      <div className="flex items-center gap-3 mb-6">
                        <div className="w-10 h-10 bg-gradient-to-br from-teal-400 to-teal-500 rounded-xl flex items-center justify-center"><Icon name="calendar-range" size={20} className="text-white" /></div>
                        <div><h3 className="font-bold text-lg text-gray-800">Saisonplaner</h3><p className="text-sm text-gray-500">Empfehlungen nach Jahreszeit</p></div>
                      </div>
                      <div className="flex gap-2 mb-6">
                        {[{v:'all',l:'Ganzjährig'},{v:'spring',l:'Frühling'},{v:'summer',l:'Sommer'},{v:'autumn',l:'Herbst'},{v:'winter',l:'Winter'}].map(s => (
                          <button key={s.v} onClick={() => setSeasonFilter(s.v)} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${seasonFilter === s.v ? 'bg-teal-100 text-teal-700 border border-teal-200' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>{s.l}</button>
                        ))}
                      </div>
                      {(() => {
                        const seasonMap = {
                          spring: { types: ['Rosé', 'Weisswein', 'Prosecco'], desc: 'Leichte, frische Weine' },
                          summer: { types: ['Rosé', 'Weisswein', 'Champagner', 'Prosecco'], desc: 'Kühle, erfrischende Weine' },
                          autumn: { types: ['Rotwein', 'Pinot Noir'], desc: 'Mittelkräftige, erdige Weine' },
                          winter: { types: ['Rotwein', 'Barolo', 'Bordeaux'], desc: 'Kräftige, wärmende Weine' }
                        };
                        const allItems = analysisResult.allItems || [];
                        if (seasonFilter === 'all') {
                          return (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                              {Object.entries(seasonMap).map(([key, val]) => (
                                <div key={key} className="bg-gray-50 rounded-xl p-5">
                                  <h4 className="font-semibold text-gray-700 mb-1 capitalize">{key === 'spring' ? 'Frühling' : key === 'summer' ? 'Sommer' : key === 'autumn' ? 'Herbst' : 'Winter'}</h4>
                                  <p className="text-xs text-gray-500 mb-3">{val.desc}</p>
                                  <div className="text-sm text-gray-600">Empfohlene Typen: {val.types.join(', ')}</div>
                                </div>
                              ))}
                            </div>
                          );
                        }
                        const info = seasonMap[seasonFilter];
                        const filtered = allItems.filter(i => info.types.some(t => (i.typ || '').toLowerCase().includes(t.toLowerCase())));
                        return (
                          <div>
                            <p className="text-sm text-gray-500 mb-4">{info.desc} — {filtered.length} passende Weine</p>
                            <div className="space-y-2 max-h-96 overflow-y-auto">
                              {filtered.sort((a, b) => b.sales - a.sales).slice(0, 20).map(item => (
                                <div key={item.name} className="flex justify-between items-center text-sm py-2 px-3 rounded-lg bg-teal-50/50">
                                  <span className="font-medium text-gray-700 truncate mr-4">{item.name}</span>
                                  <span className="text-gray-500 font-semibold whitespace-nowrap">{formatCHF(item.sales)}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        );
                      })()}
                    </div>
                  </div>
                )}

                {/* ========== Trends Tab ========== */}
                {activeTab === 'trends' && (analysisResult.winners?.length > 0 || analysisResult.losers?.length > 0) && (
                  <div className="tab-transition grid grid-cols-1 md:grid-cols-2 gap-5" key={`tab-trends-${tabKey}`}>
                    <div className="bg-white rounded-2xl border border-emerald-200 p-6 shadow-sm">
                      <div className="flex items-center gap-3 mb-6"><div className="w-10 h-10 bg-gradient-to-br from-emerald-400 to-emerald-500 rounded-xl flex items-center justify-center"><Icon name="trending-up" size={20} className="text-white" /></div><div><h3 className="font-bold text-lg text-gray-800">{STRINGS.trends.winners}</h3><p className="text-xs text-gray-400">{STRINGS.trends.winnersDesc}</p></div></div>
                      <div className="space-y-3">
                        {(analysisResult.winners||[]).map(item => (
                          <div key={item.name} className="flex items-center justify-between py-3 px-4 rounded-xl bg-emerald-50/50 hover:bg-emerald-50 transition stagger-item">
                            <div className="min-w-0 mr-3"><div className="font-medium text-gray-800 truncate" title={item.name}>{item.name}</div><div className="text-xs text-gray-500">{formatCHF(item.salesVJ)} → {formatCHF(item.salesNow)}</div></div>
                            <div className="text-right flex-shrink-0"><div className="text-sm font-bold text-emerald-700">+{formatCHF(item.diff)}</div><div className="text-xs font-semibold text-emerald-600">+{item.pctChange.toFixed(1)}%</div></div>
                          </div>
                        ))}
                        {(!analysisResult.winners||analysisResult.winners.length===0) && <p className="text-gray-400 text-sm text-center py-4">{STRINGS.trends.noWinners}</p>}
                      </div>
                    </div>
                    <div className="bg-white rounded-2xl border border-red-200 p-6 shadow-sm">
                      <div className="flex items-center gap-3 mb-6"><div className="w-10 h-10 bg-gradient-to-br from-red-400 to-red-500 rounded-xl flex items-center justify-center"><Icon name="trending-down" size={20} className="text-white" /></div><div><h3 className="font-bold text-lg text-gray-800">{STRINGS.trends.losers}</h3><p className="text-xs text-gray-400">{STRINGS.trends.losersDesc}</p></div></div>
                      <div className="space-y-3">
                        {(analysisResult.losers||[]).map(item => (
                          <div key={item.name} className="flex items-center justify-between py-3 px-4 rounded-xl bg-red-50/50 hover:bg-red-50 transition stagger-item">
                            <div className="min-w-0 mr-3"><div className="font-medium text-gray-800 truncate" title={item.name}>{item.name}</div><div className="text-xs text-gray-500">{formatCHF(item.salesVJ)} → {formatCHF(item.salesNow)}</div></div>
                            <div className="text-right flex-shrink-0"><div className="text-sm font-bold text-red-700">{formatCHF(item.diff)}</div><div className="text-xs font-semibold text-red-600">{item.pctChange.toFixed(1)}%</div></div>
                          </div>
                        ))}
                        {(!analysisResult.losers||analysisResult.losers.length===0) && <p className="text-gray-400 text-sm text-center py-4">{STRINGS.trends.noLosers}</p>}
                      </div>
                    </div>
                  </div>
                )}

              </div>
            )}

            {/* Modal: Unmatched Items */}
            {uiState.showUnmatched && (
              <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-3xl w-full max-w-3xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden fade-in-scale mobile-modal">
                  <div className="flex justify-between items-center p-6 border-b border-gray-100">
                    <div className="flex items-center gap-3"><div className="w-10 h-10 bg-amber-100 rounded-xl flex items-center justify-center"><Icon name="alert-circle" size={20} className="text-amber-600" /></div><div><h2 className="text-lg font-bold text-gray-900">{STRINGS.unmatched.title}</h2><p className="text-xs text-gray-500">{STRINGS.unmatched.sub}</p></div></div>
                    <button onClick={()=>setUiState({...uiState,showUnmatched:false})} className="w-9 h-9 modal-close-btn flex items-center justify-center rounded-xl transition" aria-label="Schliessen"><svg className="close-x" width="18" height="18" viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                  </div>
                  <div className="p-6 overflow-y-auto flex-1 bg-gray-50/50">
                    <div className="space-y-3">
                      {unmatchedItems.map((item,i) => (
                        <div key={item.name} className="flex flex-col lg:flex-row lg:items-center gap-4 bg-white p-4 rounded-xl border border-gray-200 shadow-sm hover:border-gray-300 transition mobile-unmatched-row">
                          <div className="flex-1 min-w-0"><span className="font-bold text-gray-800 block truncate" title={item.name}>{item.name}</span><span className="text-xs text-gray-500">Menge: <span className="font-semibold text-gray-700">{item.qty}</span></span></div>
                          <div className="flex flex-wrap items-center gap-2 mobile-input-group">
                            <input type="number" placeholder="VP" className="w-20 px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition" id={`vp-${i}`} />
                            <input type="number" placeholder="EP" className="w-20 px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition" id={`ep-${i}`} />
                            <button onClick={()=>{const vp=parseFloat(document.getElementById(`vp-${i}`).value);const ep=parseFloat(document.getElementById(`ep-${i}`).value);if(vp>0&&ep>=0){saveRule(item.name,{type:'custom',vp,ep});showToast("Gespeichert","success");}else showToast("VP muss > 0 sein");}} className="px-4 py-2 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 transition shadow-sm">OK</button>
                            <div className="w-px h-8 bg-gray-200 hidden lg:block"></div>
                            {uiState.confirmIgnore===item.name ? (
                              <div className="flex items-center gap-1.5">
                                <button onClick={()=>{saveRule(item.name,{type:'ignore'});setUiState({...uiState,confirmIgnore:null});}} className="px-3 py-2 bg-red-600 text-white text-sm rounded-lg hover:bg-red-700 transition font-medium">Ja</button>
                                <button onClick={()=>setUiState({...uiState,confirmIgnore:null})} className="px-3 py-2 bg-gray-100 text-gray-600 text-sm rounded-lg hover:bg-gray-200 transition font-medium">Nein</button>
                              </div>
                            ) : (
                              <button onClick={()=>setUiState({...uiState,confirmIgnore:item.name})} className="flex items-center gap-1.5 px-3 py-2 bg-gray-100 text-gray-500 text-sm font-medium rounded-lg hover:bg-red-50 hover:text-red-600 transition"><Icon name="trash-2" size={14} />Ignorieren</button>
                            )}
                          </div>
                        </div>
                      ))}
                      {unmatchedItems.length===0 && (
                        <div className="text-center py-16"><div className="w-16 h-16 bg-emerald-100 rounded-2xl flex items-center justify-center mx-auto mb-4"><Icon name="circle-check" size={32} className="text-emerald-500" /></div><h3 className="text-lg font-bold text-gray-800">{STRINGS.unmatched.allClear}</h3><p className="text-gray-500 text-sm mt-1">{STRINGS.unmatched.allClearSub}</p></div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* Modal: Betrieb Management */}
            {showBetriebModal && (
              <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden fade-in-scale">
                  <div className="flex justify-between items-center p-6 border-b border-gray-100">
                    <h2 className="text-lg font-bold text-gray-900">Betriebe verwalten</h2>
                    <button onClick={() => setShowBetriebModal(false)} className="w-9 h-9 modal-close-btn flex items-center justify-center rounded-xl transition"><svg className="close-x" width="18" height="18" viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                  </div>
                  <div className="p-6 space-y-5">
                    {/* Bestehende Betriebe */}
                    <div>
                      <h4 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Betriebe ({betriebe.length})</h4>
                      <div className="space-y-2">
                        {betriebe.map(b => (
                          <div key={b.id} onClick={() => setCurrentBetrieb(b.id)}
                            className={`flex items-center justify-between p-4 rounded-xl cursor-pointer transition-all ${b.id === currentBetrieb ? 'bg-wine-50 border-2 border-wine-300 shadow-sm' : 'bg-gray-50 border-2 border-transparent hover:bg-gray-100 hover:border-gray-200'}`}>
                            <div className="flex items-center gap-3">
                              <div className={`w-9 h-9 rounded-lg flex items-center justify-center ${b.id === currentBetrieb ? 'bg-wine-200' : 'bg-gray-200'}`}>
                                <Icon name="building-2" size={16} className={b.id === currentBetrieb ? 'text-wine-700' : 'text-gray-500'} />
                              </div>
                              <div>
                                <span className={`font-semibold ${b.id === currentBetrieb ? 'text-wine-800' : 'text-gray-700'}`}>{b.name}</span>
                                {b.id === currentBetrieb && <span className="ml-2 text-xs bg-wine-200 text-wine-700 px-2 py-0.5 rounded-full font-medium">Aktiv</span>}
                              </div>
                            </div>
                            {b.id !== 'default' && (
                              <button onClick={(e) => { e.stopPropagation(); if(b.id === currentBetrieb) setCurrentBetrieb('default'); setBetriebe(prev => prev.filter(x => x.id !== b.id)); }}
                                className="text-xs px-3 py-1.5 bg-red-50 text-red-500 rounded-lg hover:bg-red-100 hover:text-red-700 transition font-medium">Löschen</button>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Neuer Betrieb */}
                    <div className="border-t border-gray-100 pt-5">
                      <h4 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Neuer Betrieb hinzufügen</h4>
                      <div className="flex gap-2">
                        <input value={newBetriebName} onChange={e => setNewBetriebName(e.target.value)}
                          onKeyDown={e => { if (e.key === 'Enter' && newBetriebName.trim()) { const id='betrieb_'+Date.now(); setBetriebe(prev=>[...prev,{id,name:newBetriebName.trim(),logo:null}]); setNewBetriebName(''); setCurrentBetrieb(id); }}}
                          placeholder="z.B. Restaurant Seegarten..."
                          className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-wine-500 focus:border-transparent" />
                        <button onClick={() => {
                          if (newBetriebName.trim()) {
                            const id = 'betrieb_' + Date.now();
                            setBetriebe(prev => [...prev, { id, name: newBetriebName.trim(), logo: null }]);
                            setCurrentBetrieb(id);
                            setNewBetriebName('');
                          }
                        }} className="px-5 py-2.5 bg-wine-600 text-white rounded-xl text-sm font-semibold hover:bg-wine-700 transition shadow-sm">
                          <Icon name="plus" size={16} />
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* Modal: Ziel setzen */}
            {showZielModal && (
              <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-3xl w-full max-w-sm shadow-2xl overflow-hidden fade-in-scale">
                  <div className="flex justify-between items-center p-6 border-b border-gray-100">
                    <h2 className="text-lg font-bold text-gray-900">Umsatzziel setzen</h2>
                    <button onClick={() => setShowZielModal(false)} className="w-9 h-9 modal-close-btn flex items-center justify-center rounded-xl transition"><svg className="close-x" width="18" height="18" viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                  </div>
                  <div className="p-6 space-y-4">
                    <div>
                      <label className="text-sm font-medium text-gray-600 mb-1 block">Ziel-Umsatz (CHF)</label>
                      <input type="number" value={tempZiel} onChange={e => setTempZiel(Number(e.target.value))} className="w-full px-4 py-3 border border-gray-200 rounded-xl text-lg font-bold focus:outline-none focus:ring-2 focus:ring-wine-500 transition" />
                    </div>
                    <div className="flex gap-3">
                      <button onClick={() => { setZielUmsatz(tempZiel); setShowZielModal(false); }} className="flex-1 px-4 py-3 bg-wine-600 text-white rounded-xl font-semibold hover:bg-wine-700 transition">Speichern</button>
                      {zielUmsatz > 0 && <button onClick={() => { setZielUmsatz(0); setShowZielModal(false); }} className="px-4 py-3 bg-red-50 text-red-600 rounded-xl font-semibold hover:bg-red-100 transition">Entfernen</button>}
                    </div>
                  </div>
                </div>
              </div>
            )}

          </div>

          {/* Footer */}
          <div className="app-footer border-t border-gray-100 mt-12 no-print">
            <div className="max-w-7xl mx-auto px-6 md:px-10 py-6 flex items-center justify-between text-xs text-gray-400">
              <span>{STRINGS.app.tool} v{APP_VERSION}</span>
              <span>{masterData.length > 0 ? `${masterData.length} Weine in Masterliste` : STRINGS.app.noData}</span>
            </div>
          </div>

          {/* Print Footer */}
          <div className="print-footer">
            <div style={{borderTop: '1px solid #ddd', paddingTop: '8px', marginTop: '16px', fontSize: '8pt', color: '#999', display: 'flex', justifyContent: 'space-between'}}>
              <span>{betriebInfo.name} — {STRINGS.app.title} v{APP_VERSION}</span>
              <span>Erstellt am {new Date().toLocaleDateString('de-CH')}</span>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // SECTION: Application Bootstrap
    // ============================================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
